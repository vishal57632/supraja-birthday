/* ========================= Confetti ========================= */
function useConfetti() {
  const canvasRef = useRef(null);
  const particles = useRef([]);
  const raf = useRef(null);
  const COLORS = ["#f9a8d4", "#7dd3fc", "#fda4af", "#fbcfe8", "#bae6fd", "#fecdd3", "#e9d5ff", "#fde68a"];

  const loop = useCallback(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.current = particles.current.filter((p) => p.life > 0);

    particles.current.forEach((p) => {
      p.vy += 0.13;
      p.vx *= 0.995;
      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.vr;
      p.life -= 1;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate((p.rot * Math.PI) / 180);
      ctx.globalAlpha = Math.min(1, p.life / 45);
      ctx.fillStyle = p.color;
      if (p.shape === "circle") {
        ctx.beginPath();
        ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
        ctx.fill();
      } else if (p.shape === "heart") {
        ctx.beginPath();
        const s = p.size / 10;
        ctx.moveTo(0, 3 * s);
        ctx.bezierCurveTo(0, 0, -5 * s, 0, -5 * s, -3 * s);
        ctx.bezierCurveTo(-5 * s, -7 * s, 0, -6 * s, 0, -2 * s);
        ctx.bezierCurveTo(0, -6 * s, 5 * s, -7 * s, 5 * s, -3 * s);
        ctx.bezierCurveTo(5 * s, 0, 0, 0, 0, 3 * s);
        ctx.fill();
      } else {
        ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      }
      ctx.restore();
    });

    if (particles.current.length > 0) raf.current = requestAnimationFrame(loop);
    else raf.current = null;
  }, []);

  const fire = useCallback(
    (originX, originY, count = 130) => {
      const canvas = canvasRef.current;
      if (!canvas) return;
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      const ox = originX ?? window.innerWidth / 2;
      const oy = originY ?? window.innerHeight / 2;
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 4 + Math.random() * 11;
        const r = Math.random();
        particles.current.push({
          x: ox,
          y: oy,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 4,
          size: 6 + Math.random() * 9,
          color: COLORS[Math.floor(Math.random() * COLORS.length)],
          rot: Math.random() * 360,
          vr: (Math.random() - 0.5) * 14,
          life: 110 + Math.random() * 70,
          shape: r > 0.78 ? "heart" : r > 0.45 ? "circle" : "rect",
        });
      }
      if (!raf.current) raf.current = requestAnimationFrame(loop);
    },
    [loop]
  );

  useEffect(() => () => raf.current && cancelAnimationFrame(raf.current), []);
  const Canvas = () => <canvas ref={canvasRef} className="pointer-events-none fixed inset-0 z-50" />;
  return { fire, Canvas };
}

/* ========================= Music Player ========================= */
function MusicPlayer() {
  const [playing, setPlaying] = useState(false);
  const [ready, setReady] = useState(false);
  const playerRef = useRef(null);
  const holderRef = useRef(null);

  /* load the YouTube IFrame API once, then build a hidden player */
  useEffect(() => {
    const build = () => {
      playerRef.current = new window.YT.Player(holderRef.current, {
        height: "0",
        width: "0",
        videoId: MUSIC.videoId,
        playerVars: {
          start: MUSIC.startAt,
          controls: 0,
          disablekb: 1,
          playsinline: 1,
          rel: 0,
        },
        events: {
          onReady: () => setReady(true),
          onStateChange: (e) => {
            if (e.data === window.YT.PlayerState.PLAYING) setPlaying(true);
            if (e.data === window.YT.PlayerState.PAUSED) setPlaying(false);
            /* loop back to the chorus when it finishes */
            if (e.data === window.YT.PlayerState.ENDED) {
              playerRef.current.seekTo(MUSIC.startAt, true);
              playerRef.current.playVideo();
            }
          },
        },
      });
    };

    if (window.YT && window.YT.Player) {
      build();
    } else {
      const prev = window.onYouTubeIframeAPIReady;
      window.onYouTubeIframeAPIReady = () => {
        prev && prev();
        build();
      };
      if (!document.getElementById("yt-iframe-api")) {
        const tag = document.createElement("script");
        tag.id = "yt-iframe-api";
        tag.src = "https://www.youtube.com/iframe_api";
        document.body.appendChild(tag);
      }
    }

    return () => {
      try {
        playerRef.current?.destroy();
      } catch {}
    };
  }, []);

  const toggle = () => {
    const p = playerRef.current;
    if (!p || !ready) return;
    if (playing) {
      p.pauseVideo();
    } else {
      /* always drop the needle right on the chorus */
      p.seekTo(MUSIC.startAt, true);
      p.playVideo();
    }
  };

  return (
    <div className="fixed bottom-6 left-6 z-40">
      {/* hidden YouTube player */}
      <div className="pointer-events-none absolute h-0 w-0 overflow-hidden opacity-0">
        <div ref={holderRef} />
      </div>

      <button
        onClick={toggle}
        disabled={!ready}
        className="group flex items-center gap-3 rounded-full border border-white/70 bg-white/60 py-2 pl-2 pr-5 shadow-xl shadow-pink-200/50 backdrop-blur-md transition-all hover:-translate-y-0.5 hover:shadow-2xl disabled:opacity-70"
      >
        <span
          className={`flex h-10 w-10 items-center justify-center rounded-full bg-gradient-to-br from-pink-300 to-sky-300 text-white shadow-md ${
            playing ? "animate-spinSlow" : ""
          }`}
        >
          {playing ? (
            <Pause className="h-4 w-4" fill="currentColor" />
          ) : (
            <Play className="h-4 w-4 translate-x-[1px]" fill="currentColor" />
          )}
        </span>

        <span className="text-left leading-tight">
          <span className="flex items-center gap-1 text-sm font-bold text-rose-500">
            <Music className="h-3.5 w-3.5" />
            {MUSIC.title}
          </span>
          <span className="text-xs text-sky-500">
            {!ready ? "Loading…" : playing ? "Now playing… ♪" : MUSIC.artist}
          </span>
        </span>

        {playing && (
          <span className="ml-1 flex h-5 items-end gap-[2px]">
            {[0, 1, 2].map((i) => (
              <span
                key={i}
                className="w-[3px] rounded-full bg-pink-400 animate-eq"
                style={{ animationDelay: `${i * 0.15}s` }}
              />
            ))}
          </span>
        )}
      </button>
    </div>
  );
}

/* =========================================================================
   📸 SCROLL REVEAL GALLERY — each photo pops in as you scroll to it
   ========================================================================= */
function useInView(threshold = 0.25) {
  const ref = useRef(null);
  const [seen, setSeen] = useState(false);

  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      ([entry]) => {
        if (entry.isIntersecting) {
          setSeen(true);
          obs.unobserve(el); // reveal once, then stay
        }
      },
      { threshold, rootMargin: "0px 0px -60px 0px" }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, [threshold]);

  return [ref, seen];
}

/* =========================================================================
   🔍 LIGHTBOX — full-size photo pop-up with prev/next + keyboard nav
   ========================================================================= */
function Lightbox({ index, onClose, onPrev, onNext }) {
  const open = index !== null;

  useEffect(() => {
    if (!open) return;
    const onKey = (e) => {
      if (e.key === "Escape") onClose();
      if (e.key === "ArrowLeft") onPrev();
      if (e.key === "ArrowRight") onNext();
    };
    window.addEventListener("keydown", onKey);
    document.body.style.overflow = "hidden";
    return () => {
      window.removeEventListener("keydown", onKey);
      document.body.style.overflow = "";
    };
  }, [open, onClose, onPrev, onNext]);

  if (!open) return null;
  const img = GALLERY_IMAGES[index];

  return (
    <div
      onClick={onClose}
      className="animate-fadeIn fixed inset-0 z-[60] flex items-center justify-center bg-rose-100/40 p-4 backdrop-blur-xl sm:p-8"
    >

        .animate-drift1 { animation: drift1 14s ease-in-out infinite; }
        @keyframes drift2 { 0%,100% { transform: translate(0,0) scale(1) } 50% { transform: translate(-50px,60px) scale(1.2) } }
        .animate-drift2 { animation: drift2 17s ease-in-out infinite; }
        @keyframes drift3 { 0%,100% { transform: translate(0,0) scale(1.1) } 50% { transform: translate(40px,-50px) scale(1) } }
        .animate-drift3 { animation: drift3 20s ease-in-out infinite; }

        @keyframes sweep { 0% { transform: translateX(-100%) } 100% { transform: translateX(100%) } }
        .animate-sweep { animation: sweep 8s ease-in-out infinite; }

        @keyframes shine { 0% { transform: translateX(-120%) } 60%,100% { transform: translateX(120%) } }
        .animate-shine { animation: shine 3s ease-in-out infinite; }

        @keyframes dropIn { 0% { opacity: 0; transform: translateY(-24px) scale(.96) } 100% { opacity: 1; transform: translateY(0) scale(1) } }
        .animate-dropIn { animation: dropIn .9s cubic-bezier(.22,1,.36,1) both; }

        @keyframes pulseGlow { 0%,100% { opacity: .35 } 50% { opacity: .7 } }
        .animate-pulseGlow { animation: pulseGlow 3.5s ease-in-out infinite; }

        @keyframes twinkle {
          0%,100% { opacity: .3; transform: scale(.8) rotate(0deg) }
          50% { opacity: 1; transform: scale(1.3) rotate(20deg) }
        }
        .animate-twinkle { animation: twinkle 2.6s ease-in-out infinite; }

        @keyframes bobble { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-9px) } }
        .animate-bobble { animation: bobble 2.4s ease-in-out infinite; }

        @keyframes bounceSoft { 0%,100% { transform: translateY(0); opacity:.6 } 50% { transform: translateY(8px); opacity:1 } }
        .animate-bounceSoft { animation: bounceSoft 2s ease-in-out infinite; }
      `}</style>

      <SparkleField />
      <Canvas />
      <MusicPlayer />

      {/* HERO */}
      <section className="relative flex min-h-screen flex-col items-center justify-center overflow-hidden px-4 text-center">
        {/* animated aurora orbs */}
        <div className="pointer-events-none absolute inset-0">
          <div className="animate-drift1 absolute -left-20 top-10 h-[420px] w-[420px] rounded-full bg-pink-300/40 blur-[110px]" />
          <div className="animate-drift2 absolute -right-16 top-32 h-[460px] w-[460px] rounded-full bg-sky-300/40 blur-[120px]" />
          <div className="animate-drift3 absolute bottom-0 left-1/3 h-[380px] w-[380px] rounded-full bg-rose-300/40 blur-[110px]" />
        </div>

        {/* shimmering light sweep */}
        <div className="animate-sweep pointer-events-none absolute inset-0 bg-gradient-to-r from-transparent via-white/50 to-transparent" />

        <Balloons />

        <div className="relative z-10">
          {/* badge */}
          <div className="animate-dropIn mb-7 inline-flex items-center gap-2 rounded-full border border-white/70 bg-white/60 px-6 py-2.5 shadow-lg shadow-pink-200/50 backdrop-blur-md">
            <Sparkles className="h-4 w-4 animate-pulse text-pink-400" />
            <span className="text-sm font-bold tracking-wide text-sky-500">
              July 14 · a little something for you
            </span>
            <Sparkles className="h-4 w-4 animate-pulse text-sky-400" />
          </div>

          {/* the name */}
          <h1 className="animate-dropIn font-serif text-5xl leading-[1.15] sm:text-6xl md:text-8xl" style={{ animationDelay: ".15s" }}>
            <span className="block text-slate-600/90">Happy Birthday,</span>
            <span className="relative mt-2 block">
              {/* glow behind the name */}
              <span className="absolute inset-0 animate-pulseGlow bg-gradient-to-r from-pink-400 via-rose-400 to-sky-400 bg-clip-text italic text-transparent blur-2xl">
                {FRIEND_NAME}!
              </span>
              <span className="shimmer-text relative italic drop-shadow-sm">{FRIEND_NAME}!</span>
            </span>
          </h1>

          {/* sparkle accents around name */}
          <div className="pointer-events-none relative mx-auto -mt-4 h-0 w-full max-w-2xl">
            <Sparkles className="animate-twinkle absolute -left-2 -top-24 h-7 w-7 text-pink-300" />
            <Star className="animate-twinkle absolute right-0 -top-32 h-6 w-6 text-sky-300" style={{ animationDelay: ".6s" }} fill="currentColor" />
            <Sparkles className="animate-twinkle absolute right-10 -top-6 h-5 w-5 text-rose-300" style={{ animationDelay: "1.2s" }} />
            <Star className="animate-twinkle absolute -left-6 -top-6 h-5 w-5 text-pink-200" style={{ animationDelay: "1.8s" }} fill="currentColor" />
          </div>

          <p className="animate-dropIn mx-auto mt-8 max-w-xl text-lg text-slate-600 sm:text-xl" style={{ animationDelay: ".3s" }}>
            To the doctor who heals hearts and the cosmetologist who makes the world glow —
            <span className="font-bold text-rose-500"> today, the sparkle is all yours.</span> 💗
          </p>

          {/* confetti button */}
          <button
            onClick={burst}
            className="animate-dropIn group relative mt-10 inline-flex items-center gap-3 overflow-hidden rounded-full bg-gradient-to-r from-pink-400 via-rose-400 to-sky-400 px-10 py-4 text-lg font-bold text-white shadow-2xl shadow-pink-400/50 transition-all hover:-translate-y-1 hover:shadow-pink-400/70 active:scale-95"
            style={{ animationDelay: ".45s" }}
          >
            {/* shine sweep across the button */}
            <span className="animate-shine absolute inset-0 bg-gradient-to-r from-transparent via-white/60 to-transparent" />
            <PartyPopper className="relative h-5 w-5 transition-transform group-hover:-rotate-12" />
            <span className="relative">Release the Confetti!</span>
            <Sparkles className="relative h-5 w-5 transition-transform group-hover:rotate-12" />
          </button>

          {/* icon row */}
          <div className="animate-dropIn mt-10 flex items-center justify-center gap-5" style={{ animationDelay: ".6s" }}>
            {[
              { Ic: Stethoscope, c: "text-sky-400" },
              { Ic: Heart, c: "text-pink-400", fill: true },
              { Ic: Gift, c: "text-rose-400" },
              { Ic: Heart, c: "text-rose-300", fill: true },
              { Ic: Flower2, c: "text-sky-400" },
            ].map(({ Ic, c, fill }, i) => (
              <div
                key={i}
                className="animate-bobble flex h-12 w-12 items-center justify-center rounded-2xl border border-white/70 bg-white/60 shadow-lg backdrop-blur-md"
                style={{ animationDelay: `${i * 0.18}s` }}
              >
                <Ic className={`h-5 w-5 ${c}`} fill={fill ? "currentColor" : "none"} />
              </div>
            ))}
          </div>
        </div>

        {/* scroll cue */}
        <div className="animate-bounceSoft absolute bottom-8 flex flex-col items-center gap-1 text-sky-400">
          <span className="text-xs font-bold uppercase tracking-[0.25em]">Scroll</span>
          <ChevronDown className="h-5 w-5" />
        </div>
      </section>

      {/* GALLERY */}
      <section className="relative z-10 px-6 py-20">
        <div className="mb-12 text-center">
          <h2 className="font-serif text-4xl text-rose-500">Aesthetic Memories</h2>
          <p className="mt-2 text-slate-500">Keep scrolling — they'll come to you ✨🎀</p>
        </div>
        <ScrollGallery onExpand={(i) => setLightbox(i)} />
      </section>

      <Lightbox index={lightbox} onClose={closeBox} onPrev={prevBox} onNext={nextBox} />

      {/* 🎶 THE VERSE + 💌 THE LETTER */}
      <section className="relative z-10 px-6 py-20">
        <Verse />

        <div className="mb-12 mt-24 text-center">
          <h2 className="font-serif text-4xl text-rose-500">A Letter Across the Miles</h2>
          <p className="mt-2 text-slate-500">Some things are better said properly 💌</p>
        </div>
        <LoveLetter onOpen={letterBurst} />
      </section>

      {/* PRESCRIPTION */}
      <section className="relative z-10 px-6 py-20">
        <div className="mb-12 text-center">
          <h2 className="font-serif text-4xl text-sky-500">Your Prescription for Happiness</h2>
          <p className="mt-2 text-slate-500">Doctor's orders — for a perfect year 💊</p>
        </div>
        <PrescriptionCard />
      </section>

      {/* WHY YOU GLOW */}
      <section className="relative z-10 px-6 py-20">
        <div className="mb-14 text-center">
          <h2 className="font-serif text-4xl text-rose-500">Why You Glow</h2>
          <p className="mt-2 text-slate-500">All the reasons you light up every room 🌟</p>
        </div>
        <GlowTimeline />
      </section>

      {/* FOOTER */}
      <footer className="relative z-10 px-6 py-16 text-center">
        <div className="mx-auto max-w-lg rounded-3xl border border-white/60 bg-white/50 p-8 shadow-xl backdrop-blur-md">
          <Droplets className="mx-auto h-8 w-8 text-pink-300" />
          <p className="mt-4 font-serif text-2xl italic text-rose-500">Here's to another year of glowing.</p>
          <p className="mt-2 text-slate-500">With endless love & sparkle — Happy Birthday! 🥂🎀</p>
          <button
            onClick={burst}
            className="mt-6 inline-flex items-center gap-2 rounded-full border border-pink-200 bg-white/70 px-6 py-3 text-sm font-bold text-rose-500 shadow-md transition-all hover:-translate-y-0.5 hover:shadow-lg active:scale-95"
          >
            <PartyPopper className="h-4 w-4" />
            One more time! 🎊
          </button>
          <div className="mt-6 flex justify-center gap-2">
            {[Heart, Sparkles, Flower2, Star, Heart].map((Ic, i) => (
              <Ic key={i} className="h-5 w-5 text-sky-300" />
            ))}
          </div>
        </div>
      </footer>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<BirthdayWebsite />);
</script>
</body>
</html>
